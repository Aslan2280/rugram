<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuGram - Чат</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
        }
        .chat-name {
            font-weight: bold;
            font-size: 18px;
            flex: 1;
        }
        .encryption-badge {
            font-size: 12px;
            background: rgba(66,158,243,0.2);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-area {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--border);
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        .attach-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            font-size: 20px;
            cursor: pointer;
        }
        .send-btn {
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 44px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .message-media {
            max-width: 200px;
            border-radius: 12px;
            margin-top: 6px;
            cursor: pointer;
        }
        .file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="glass chat-header">
        <button class="back-btn" onclick="window.location.href='chats.html'">←</button>
        <div class="chat-name" id="chatName">Загрузка...</div>
        <div class="encryption-badge">🔒 AES-256</div>
    </div>

    <div class="messages-container" id="messagesContainer"></div>

    <div class="input-area glass">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="messageInput" placeholder="Сообщение...">
        <button class="send-btn" onclick="sendMessage()">➤</button>
        <input type="file" id="fileInput" class="file-input" accept="image/*,video/*,.pdf,.doc,.txt">
    </div>

    <div class="theme-switch">
        <button class="theme-btn light" onclick="setTheme('light')"></button>
        <button class="theme-btn dark" onclick="setTheme('dark')"></button>
        <button class="theme-btn personal" onclick="setTheme('personal')"></button>
    </div>

    <script type="module">
        import RuGram from './main.js'
        
        let currentChat = null
        let messages = []
        
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme)
            localStorage.setItem('theme', theme)
        }
        
        async function loadChat() {
            currentChat = RuGram.getCurrentChat()
            if (!currentChat) {
                window.location.href = 'chats.html'
                return
            }
            
            document.getElementById('chatName').innerText = currentChat.name
            
            messages = await RuGram.loadMessages(currentChat.id)
            renderMessages()
            
            RuGram.subscribeChat(currentChat.id, (newMsg) => {
                messages.push(newMsg)
                renderMessages()
            })
        }
        
        function renderMessages() {
            const container = document.getElementById('messagesContainer')
            container.innerHTML = messages.map(msg => {
                const isOut = msg.sender_id === RuGram.getCurrentUser()?.id
                let content = ''
                
                if (msg.decrypted_content) {
                    content = `<div>${msg.decrypted_content}</div>`
                } else if (msg.encrypted_content) {
                    content = `<div>🔒 Зашифрованное сообщение</div>`
                }
                
                if (msg.media_url) {
                    if (msg.media_type === 'image') {
                        content += `<img src="${msg.media_url}" class="message-media" onclick="window.open('${msg.media_url}')">`
                    } else if (msg.media_type === 'video') {
                        content += `<video src="${msg.media_url}" controls class="message-media"></video>`
                    } else {
                        content += `<a href="${msg.media_url}" download style="color:var(--accent)">📄 ${msg.file_name || 'Файл'}</a>`
                    }
                }
                
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
                
                return `<div class="message ${isOut ? 'out' : 'in'}">
                            ${content}
                            <div style="font-size:10px; opacity:0.7; margin-top:4px">${time}</div>
                        </div>`
            }).join('')
            container.scrollTop = container.scrollHeight
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput')
            const text = input.value.trim()
            if (!text) return
            
            await RuGram.sendTextMessage(currentChat.id, text)
            input.value = ''
            
            const newMessages = await RuGram.loadMessages(currentChat.id)
            messages = newMessages
            renderMessages()
        }
        
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0]
            if (!file) return
            
            await RuGram.sendFileMessage(currentChat.id, file)
            const newMessages = await RuGram.loadMessages(currentChat.id)
            messages = newMessages
            renderMessages()
            document.getElementById('fileInput').value = ''
        })
        
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage()
        })
        
        const savedTheme = localStorage.getItem('theme') || 'light'
        document.body.setAttribute('data-theme', savedTheme)
        
        window.setTheme = setTheme
        window.sendMessage = sendMessage
        
        const user = await RuGram.init()
        if (!user) window.location.href = 'index.html'
        await loadChat()
    </script>
</body>
</html>
