<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuGram - Регистрация</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .register-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 32px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .error-msg {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
        .success-msg {
            color: #38a169;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="glass register-container">
            <div class="logo">✨</div>
            <div class="title">Создать аккаунт</div>
            <div class="subtitle">Присоединяйся к RuGram</div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="username" class="input" placeholder="ivan123" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" class="input" placeholder="ivan@example.com" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="password" class="input" placeholder="минимум 6 символов" required>
                </div>
                <div class="input-group">
                    <label>Подтверждение пароля</label>
                    <input type="password" id="confirm" class="input" placeholder="повторите пароль" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Зарегистрироваться</button>
                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg">Аккаунт создан! Перенаправление...</div>
            </form>
            
            <div class="register-link" style="margin-top: 20px;">
                Уже есть аккаунт? <a href="index.html">Войти</a>
            </div>
        </div>
    </div>

    <div class="theme-switch">
        <button class="theme-btn light" onclick="window.setTheme('light')"></button>
        <button class="theme-btn dark" onclick="window.setTheme('dark')"></button>
        <button class="theme-btn personal" onclick="window.setTheme('personal')"></button>
    </div>

    <script type="module">
        import RuGram from './main.js'
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            const username = document.getElementById('username').value
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const confirm = document.getElementById('confirm').value
            
            if (password !== confirm) {
                document.getElementById('errorMsg').textContent = 'Пароли не совпадают'
                document.getElementById('errorMsg').style.display = 'block'
                return
            }
            
            if (password.length < 6) {
                document.getElementById('errorMsg').textContent = 'Пароль должен быть не менее 6 символов'
                document.getElementById('errorMsg').style.display = 'block'
                return
            }
            
            try {
                await RuGram.register(email, password, username)
                document.getElementById('errorMsg').style.display = 'none'
                document.getElementById('successMsg').style.display = 'block'
                
                setTimeout(() => {
                    window.location.href = 'index.html'
                }, 2000)
            } catch (err) {
                document.getElementById('errorMsg').textContent = err.message || 'Ошибка регистрации'
                document.getElementById('errorMsg').style.display = 'block'
            }
        })
    </script>
</body>
</html>
