<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuGram - Профиль</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .profile-card {
            text-align: center;
            padding: 32px;
            margin-bottom: 20px;
        }
        .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 16px;
        }
        .stars-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 20px;
        }
        .stars-count {
            font-size: 32px;
            font-weight: bold;
            color: #ff9800;
        }
        .admin-badge {
            background: #dc2626;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-top: 12px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="glass profile-card">
            <div class="avatar-large">👤</div>
            <h2 id="username"></h2>
            <div id="email" style="color: var(--text-secondary); margin: 8px 0;"></div>
            <div id="adminBadge"></div>
        </div>

        <div class="glass stars-card">
            <span style="font-size: 20px;">⭐ Баланс Star</span>
            <span class="stars-count" id="starBalance">0</span>
        </div>

        <div class="glass" style="padding: 20px;">
            <div class="info-row">
                <span>Аккаунт создан</span>
                <span id="createdAt">-</span>
            </div>
            <div class="info-row">
                <span>Всего чатов</span>
                <span id="chatsCount">-</span>
            </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button class="btn" style="flex:1" onclick="window.location.href='chats.html'">← Чаты</button>
            <button class="btn-secondary" style="flex:1" onclick="logout()">🚪 Выйти</button>
        </div>
    </div>

    <div class="theme-switch">
        <button class="theme-btn light" onclick="setTheme('light')"></button>
        <button class="theme-btn dark" onclick="setTheme('dark')"></button>
        <button class="theme-btn personal" onclick="setTheme('personal')"></button>
    </div>

    <script type="module">
        import RuGram from './main.js'
        
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme)
            localStorage.setItem('theme', theme)
        }
        
        async function logout() {
            await RuGram.logout()
            window.location.href = 'index.html'
        }
        
        async function loadProfile() {
            const user = await RuGram.init()
            if (!user) {
                window.location.href = 'index.html'
                return
            }
            
            document.getElementById('username').innerText = user.username || user.email.split('@')[0]
            document.getElementById('email').innerText = user.email
            document.getElementById('createdAt').innerText = new Date(user.created_at).toLocaleDateString()
            
            const balance = await RuGram.getBalance()
            document.getElementById('starBalance').innerText = balance
            
            const chats = await RuGram.loadChats()
            document.getElementById('chatsCount').innerText = chats.length
            
            const isAdmin = await RuGram.checkAdmin()
            if (isAdmin) {
                document.getElementById('adminBadge').innerHTML = '<div class="admin-badge">👑 Администратор</div>'
                const adminBtn = document.createElement('button')
                adminBtn.innerText = '⚙️ Админ-панель'
                adminBtn.className = 'btn-secondary'
                adminBtn.style.marginTop = '16px'
                adminBtn.style.width = '100%'
                adminBtn.onclick = () => window.location.href = 'admin.html'
                document.querySelector('.profile-card').appendChild(adminBtn)
            }
        }
        
        const savedTheme = localStorage.getItem('theme') || 'light'
        document.body.setAttribute('data-theme', savedTheme)
        
        window.setTheme = setTheme
        window.logout = logout
        
        await loadProfile()
    </script>
</body>
</html>
